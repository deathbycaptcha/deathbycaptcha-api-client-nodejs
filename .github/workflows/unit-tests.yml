name: Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-npm-

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage-output.txt

      - name: Add coverage summary
        shell: bash
        run: |
          COVERAGE_LINE=$(grep -E '^All files' coverage-output.txt | tail -1 || true)
          if [ -n "$COVERAGE_LINE" ]; then
            echo "### Coverage (Node ${{ matrix.node-version }})" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$COVERAGE_LINE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
