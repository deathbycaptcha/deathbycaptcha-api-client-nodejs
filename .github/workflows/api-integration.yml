name: API Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  api_integration:
    name: API basic integration
    runs-on: ubuntu-latest
    env:
      DBC_ENV: ${{ secrets.DBC_ENV }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-npm-

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Create .env from DBC_ENV secret
        if: ${{ env.DBC_ENV != '' }}
        shell: bash
        run: |
          printf '%s\n' "$DBC_ENV" > .env
          echo "Created .env from DBC_ENV secret"

      - name: Skip integration test when secret is missing
        if: ${{ env.DBC_ENV == '' }}
        run: |
          echo "DBC_ENV secret is not configured. Skipping API integration test." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Run API integration test
        if: ${{ env.DBC_ENV != '' }}
        run: npm run test:integration:api
