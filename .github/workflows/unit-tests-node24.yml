name: Unit Tests (Node 24)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests_node24:
    name: Unit tests Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-npm-

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:unit
